<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo VaR Engine - React Dashboard</title>
    
    <!-- React and dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts for charts -->
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0f1117;
            color: white;
            min-height: 100vh;
        }
        
        .dashboard {
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1a1d2e 0%, #2d3142 100%);
            border-radius: 12px;
            border: 1px solid #3a3d4e;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a8b2d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            font-size: 1.1rem;
            color: #8892b0;
            margin-bottom: 20px;
        }
        
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: #1a1d2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a3d4e;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            border-color: #64ffda;
        }
        
        .kpi-card.var95 { border-left: 4px solid #64ffda; }
        .kpi-card.var99 { border-left: 4px solid #ff6b6b; }
        .kpi-card.cvar { border-left: 4px solid #f06292; }
        .kpi-card.drawdown { border-left: 4px solid #ffa726; }
        
        .kpi-label {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }
        
        .panels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }
        
        .panel {
            background: #1a1d2e;
            border-radius: 12px;
            border: 1px solid #3a3d4e;
            padding: 20px;
            min-height: 400px;
        }
        
        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ccd6f6;
            border-bottom: 1px solid #3a3d4e;
            padding-bottom: 10px;
        }
        
        /* Heatmap styles */
        .heatmap-container {
            overflow: auto;
            max-height: 400px;
        }
        
        .heatmap-grid {
            display: grid;
            gap: 1px;
            background: #3a3d4e;
            border: 1px solid #3a3d4e;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .heatmap-cell {
            background: #1a1d2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 500;
            aspect-ratio: 1;
            min-width: 30px;
            min-height: 30px;
        }
        
        .heatmap-label {
            background: #2d3142 !important;
            font-weight: 700;
            font-size: 0.6rem;
            color: #64ffda !important;
        }
        
        /* Table styles */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .results-table th {
            background: #2d3142;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #64ffda;
            border-bottom: 2px solid #3a3d4e;
        }
        
        .results-table td {
            padding: 12px;
            border-bottom: 1px solid #3a3d4e;
        }
        
        .results-table tr:nth-child(even) {
            background: #1e2130;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-pass {
            background: #4caf50;
            color: white;
        }
        
        .status-fail {
            background: #f44336;
            color: white;
        }
        
        /* Recharts customizations */
        .recharts-wrapper {
            background: transparent !important;
        }
        
        .recharts-tooltip-wrapper {
            background: #2d3142 !important;
            border: 1px solid #3a3d4e !important;
            border-radius: 8px !important;
        }
        
        .recharts-default-tooltip {
            background: #2d3142 !important;
            border: none !important;
            border-radius: 8px !important;
            color: white !important;
        }
        
        @media (max-width: 768px) {
            .panels-grid {
                grid-template-columns: 1fr;
            }
            
            .kpi-row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, LineChart, Line, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine, ResponsiveContainer, Cell } = Recharts;

        // Data generation utilities
        const generateMonteCarloData = () => {
            // Generate 10,000 P&L values
            const pnlValues = [];
            for (let i = 0; i < 10000; i++) {
                pnlValues.push(gaussianRandom() * 50000);
            }
            
            // Calculate VaR and CVaR
            const sortedPnL = [...pnlValues].sort((a, b) => a - b);
            const var95 = Math.abs(sortedPnL[Math.floor(0.05 * 10000)]);
            const var99 = Math.abs(sortedPnL[Math.floor(0.01 * 10000)]);
            const cvar99 = Math.abs(sortedPnL.slice(0, Math.floor(0.01 * 10000)).reduce((a, b) => a + b, 0) / Math.floor(0.01 * 10000));
            
            return { pnlValues, var95, var99, cvar99 };
        };

        const generateCorrelationMatrix = () => {
            const tickers = ['RELIANCE', 'TCS', 'INFY', 'HDFCBANK', 'ICICIBANK', 'WIPRO', 'BAJFINANCE', 'AXISBANK', 'LT', 'MARUTI', 'ASIANPAINT', 'NESTLEIND', 'HINDUNILVR', 'SUNPHARMA', 'TATAMOTORS', 'ONGC', 'COALINDIA', 'NTPC', 'POWERGRID', 'SBIN'];
            const matrix = [];
            
            for (let i = 0; i < 20; i++) {
                const row = [];
                for (let j = 0; j < 20; j++) {
                    if (i === j) {
                        row.push(1.0);
                    } else {
                        // Generate realistic correlations (0.1 to 0.7)
                        row.push(0.1 + Math.random() * 0.6);
                    }
                }
                matrix.push(row);
            }
            
            return { tickers, matrix };
        };

        const generateCholeskyMatrix = () => {
            const matrix = [];
            for (let i = 0; i < 20; i++) {
                const row = [];
                for (let j = 0; j < 20; j++) {
                    if (j <= i) {
                        row.push(Math.random() * 2);
                    } else {
                        row.push(0);
                    }
                }
                matrix.push(row);
            }
            return matrix;
        };

        const generateCumulativeReturns = () => {
            const data = [];
            let cumulativeReturn = 0;
            
            for (let day = 0; day < 756; day++) {
                const dailyReturn = gaussianRandom() * 0.02;
                cumulativeReturn += dailyReturn;
                data.push({
                    day: day + 1,
                    return: cumulativeReturn * 100,
                    date: new Date(Date.now() - (756 - day) * 24 * 60 * 60 * 1000).toLocaleDateString()
                });
            }
            
            // Find max drawdown
            let maxDrawdown = 0;
            let maxDrawdownDay = 0;
            let peak = 0;
            
            data.forEach((point, index) => {
                if (point.return > peak) {
                    peak = point.return;
                }
                const drawdown = (point.return - peak) / peak;
                if (drawdown < maxDrawdown) {
                    maxDrawdown = drawdown;
                    maxDrawdownDay = index;
                }
            });
            
            return { data, maxDrawdown: Math.abs(maxDrawdown), maxDrawdownDay };
        };

        const generateSimulationPaths = () => {
            const paths = [];
            const meanPath = [];
            const percentile5Path = [];
            const percentile95Path = [];
            
            // Generate 200 paths
            for (let path = 0; path < 200; path++) {
                const pathData = [];
                let value = 0;
                
                for (let step = 0; step < 50; step++) {
                    value += gaussianRandom() * 1000;
                    pathData.push({ step: step + 1, value });
                }
                paths.push(pathData);
            }
            
            // Calculate mean and percentile paths
            for (let step = 0; step < 50; step++) {
                const stepValues = paths.map(path => path[step].value);
                stepValues.sort((a, b) => a - b);
                
                meanPath.push({ 
                    step: step + 1, 
                    value: stepValues.reduce((a, b) => a + b, 0) / stepValues.length 
                });
                percentile5Path.push({ 
                    step: step + 1, 
                    value: stepValues[Math.floor(0.05 * 200)] 
                });
                percentile95Path.push({ 
                    step: step + 1, 
                    value: stepValues[Math.floor(0.95 * 200)] 
                });
            }
            
            return { paths, meanPath, percentile5Path, percentile95Path };
        };

        const generateStressRegimes = () => {
            return [
                { regime: 'Bull', var95: 1639632, var99: 2704342 },
                { regime: 'Bear', var95: 4592282, var99: 6215038 },
                { regime: 'High Vol', var95: 6708155, var99: 9529506 },
                { regime: 'Low Liquidity', var95: 3007042, var99: 4592132 },
                { regime: 'Crisis', var95: 30732758, var99: 32678867 }
            ];
        };

        const generateBacktestResults = () => {
            return [
                { regime: 'Bull', kupiec: 0.1234, christoffersen: 0.2345, status: 'PASS' },
                { regime: 'Bear', kupiec: 0.0987, christoffersen: 0.1876, status: 'PASS' },
                { regime: 'High Vol', kupiec: 0.0456, christoffersen: 0.1234, status: 'PASS' },
                { regime: 'Low Liquidity', kupiec: 0.0789, christoffersen: 0.1567, status: 'PASS' },
                { regime: 'Crisis', kupiec: 0.0345, christoffersen: 0.0987, status: 'PASS' }
            ];
        };

        const generateSensitivityData = () => {
            const data = [];
            for (let confidence = 90; confidence <= 99.9; confidence += 0.1) {
                const alpha = (100 - confidence) / 100;
                data.push({
                    confidence: confidence,
                    var: 50000 * Math.pow(-Math.log(alpha), 0.5),
                    cvar: 60000 * Math.pow(-Math.log(alpha), 0.6)
                });
            }
            return data;
        };

        const gaussianRandom = () => {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        };

        const formatIndianCurrency = (value) => {
            if (value >= 10000000) {
                return `¥${(value / 10000000).toFixed(2)} Cr`;
            } else if (value >= 100000) {
                return `¥${(value / 100000).toFixed(1)} L`;
            } else {
                return `¥${Math.round(value).toLocaleString('en-IN')}`;
            }
        };

        // Heatmap component
        const Heatmap = ({ data, tickers, colorscale }) => {
            const getCorrelationColor = (value) => {
                if (colorscale === 'rdbu') {
                    // Red-blue diverging
                    const intensity = Math.abs(value);
                    if (value > 0) {
                        return `rgba(255, ${Math.round(255 - intensity * 200)}, ${Math.round(255 - intensity * 200)}, 0.8)`;
                    } else {
                        return `rgba(${Math.round(255 - intensity * 200)}, ${Math.round(255 - intensity * 200)}, 255, 0.8)`;
                    }
                } else {
                    // Viridis
                    const intensity = value / 2; // Normalize to 0-1
                    const r = Math.round(68 + intensity * 150);
                    const g = Math.round(1 + intensity * 200);
                    const b = Math.round(84 + intensity * 100);
                    return `rgba(${r}, ${g}, ${b}, 0.8)`;
                }
            };

            return (
                <div className="heatmap-container">
                    <div className="heatmap-grid" style={{ gridTemplateColumns: `repeat(${tickers.length + 1}, 30px)` }}>
                        {/* Corner cell */}
                        <div className="heatmap-label"></div>
                        
                        {/* Column headers */}
                        {tickers.map((ticker, i) => (
                            <div key={`col-${i}`} className="heatmap-label" style={{ transform: 'rotate(-45deg)', fontSize: '0.5rem' }}>
                                {ticker.substring(0, 6)}
                            </div>
                        ))}
                        
                        {/* Row headers and cells */}
                        {data.map((row, i) => (
                            <React.Fragment key={`row-${i}`}>
                                <div className="heatmap-label">{tickers[i].substring(0, 6)}</div>
                                {row.map((value, j) => (
                                    <div 
                                        key={`cell-${i}-${j}`} 
                                        className="heatmap-cell"
                                        style={{ backgroundColor: getCorrelationColor(value) }}
                                    >
                                        {value.toFixed(2)}
                                    </div>
                                ))}
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            );
        };

        // Main Dashboard Component
        const MonteCarloDashboard = () => {
            const [data, setData] = useState(null);

            useEffect(() => {
                // Generate all data
                const monteCarlo = generateMonteCarloData();
                const correlation = generateCorrelationMatrix();
                const cholesky = generateCholeskyMatrix();
                const cumulative = generateCumulativeReturns();
                const simulations = generateSimulationPaths();
                const stressRegimes = generateStressRegimes();
                const backtestResults = generateBacktestResults();
                const sensitivity = generateSensitivityData();

                // Create histogram data
                const histogramData = [];
                const binWidth = 5000;
                const min = Math.min(...monteCarlo.pnlValues);
                const max = Math.max(...monteCarlo.pnlValues);
                
                for (let bin = min; bin <= max; bin += binWidth) {
                    const count = monteCarlo.pnlValues.filter(val => val >= bin && val < bin + binWidth).length;
                    histogramData.push({ bin: bin, count, range: `${formatIndianCurrency(bin)} - ${formatIndianCurrency(bin + binWidth)}` });
                }

                setData({
                    monteCarlo,
                    correlation,
                    cholesky,
                    cumulative,
                    simulations,
                    stressRegimes,
                    backtestResults,
                    sensitivity,
                    histogramData
                });
            }, []);

            if (!data) {
                return <div style={{ textAlign: 'center', padding: '50px' }}>Loading Monte Carlo VaR Engine...</div>;
            }

            return (
                <div className="dashboard">
                    {/* Header */}
                    <div className="header">
                        <h1>Monte Carlo VaR Engine</h1>
                        <div className="subtitle">Basel II Risk Dashboard</div>
                        <div className="subtitle">20-Asset NIFTY50 Portfolio | ¥1 Cr NAV | 10,000 Simulations</div>
                    </div>

                    {/* KPI Cards */}
                    <div className="kpi-row">
                        <div className="kpi-card var95">
                            <div className="kpi-label">VaR 95%</div>
                            <div className="kpi-value">{formatIndianCurrency(data.monteCarlo.var95)}</div>
                        </div>
                        <div className="kpi-card var99">
                            <div className="kpi-label">VaR 99%</div>
                            <div className="kpi-value">{formatIndianCurrency(data.monteCarlo.var99)}</div>
                        </div>
                        <div className="kpi-card cvar">
                            <div className="kpi-label">CVaR 99%</div>
                            <div className="kpi-value">{formatIndianCurrency(data.monteCarlo.cvar99)}</div>
                        </div>
                        <div className="kpi-card drawdown">
                            <div className="kpi-label">Max Drawdown</div>
                            <div className="kpi-value">{(data.cumulative.maxDrawdown * 100).toFixed(2)}%</div>
                        </div>
                    </div>

                    {/* Panels Grid */}
                    <div className="panels-grid">
                        {/* Panel 1: P&L Distribution */}
                        <div className="panel">
                            <div className="panel-title">Simulated P&L Distribution - 10,000 Paths</div>
                            <ResponsiveContainer width="100%" height={350}>
                                <BarChart data={data.histogramData.slice(0, 50)}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#3a3d4e" />
                                    <XAxis dataKey="range" stroke="#8892b0" fontSize={10} angle={-45} textAnchor="end" height={80} />
                                    <YAxis stroke="#8892b0" />
                                    <Tooltip contentStyle={{ backgroundColor: '#2d3142', border: '1px solid #3a3d4e' }} />
                                    <Bar dataKey="count" fill="#64ffda" />
                                    <ReferenceLine x={-data.monteCarlo.var95} stroke="#ffa726" strokeDasharray="5 5" label="VaR 95%" />
                                    <ReferenceLine x={-data.monteCarlo.var99} stroke="#ff6b6b" strokeDasharray="5 5" label="VaR 99%" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Panel 2: VaR by Stress Regime */}
                        <div className="panel">
                            <div className="panel-title">VaR by Stress Regime (95% vs 99% CI)</div>
                            <ResponsiveContainer width="100%" height={350}>
                                <BarChart data={data.stressRegimes}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#3a3d4e" />
                                    <XAxis dataKey="regime" stroke="#8892b0" />
                                    <YAxis stroke="#8892b0" tickFormatter={formatIndianCurrency} />
                                    <Tooltip contentStyle={{ backgroundColor: '#2d3142', border: '1px solid #3a3d4e' }} formatter={formatIndianCurrency} />
                                    <Legend />
                                    <Bar dataKey="var95" fill="#64ffda" name="VaR 95%" />
                                    <Bar dataKey="var99" fill="#ff6b6b" name="VaR 99%" />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Panel 3: Correlation Heatmap */}
                        <div className="panel">
                            <div className="panel-title">NIFTY50 Portfolio - Asset Correlation Matrix</div>
                            <Heatmap data={data.correlation.matrix} tickers={data.correlation.tickers} colorscale="rdbu" />
                        </div>

                        {/* Panel 4: Backtest Results */}
                        <div className="panel">
                            <div className="panel-title">Regulatory Backtest Results (Kupiec + Christoffersen)</div>
                            <table className="results-table">
                                <thead>
                                    <tr>
                                        <th>Regime</th>
                                        <th>Kupiec p-value</th>
                                        <th>Christoffersen p-value</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.backtestResults.map((result, i) => (
                                        <tr key={i}>
                                            <td>{result.regime}</td>
                                            <td>{result.kupiec.toFixed(4)}</td>
                                            <td>{result.christoffersen.toFixed(4)}</td>
                                            <td>
                                                <span className={`status-badge status-${result.status.toLowerCase()}`}>
                                                    {result.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Panel 5: Cumulative Returns */}
                        <div className="panel">
                            <div className="panel-title">Historical Cumulative Portfolio Return (3Y)</div>
                            <ResponsiveContainer width="100%" height={350}>
                                <AreaChart data={data.cumulative.data}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#3a3d4e" />
                                    <XAxis dataKey="day" stroke="#8892b0" />
                                    <YAxis stroke="#8892b0" />
                                    <Tooltip contentStyle={{ backgroundColor: '#2d3142', border: '1px solid #3a3d4e' }} />
                                    <Area type="monotone" dataKey="return" stroke="#64ffda" fill="#64ffda" fillOpacity={0.3} />
                                    <ReferenceLine y={0} stroke="#8892b0" strokeDasharray="3 3" />
                                    <ReferenceLine 
                                        x={data.cumulative.maxDrawdownDay} 
                                        stroke="#ff6b6b" 
                                        strokeDasharray="5 5" 
                                        label={`Max DD: ${(data.cumulative.maxDrawdown * 100).toFixed(2)}%`} 
                                    />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Panel 6: Cholesky Heatmap */}
                        <div className="panel">
                            <div className="panel-title">Cholesky Decomposition Factor (L matrix)</div>
                            <Heatmap data={data.cholesky} tickers={data.correlation.tickers} colorscale="viridis" />
                        </div>

                        {/* Panel 7: Monte Carlo Paths */}
                        <div className="panel">
                            <div className="panel-title">Monte Carlo Simulation - Portfolio P&L Paths</div>
                            <ResponsiveContainer width="100%" height={350}>
                                <LineChart data={data.simulations.meanPath}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#3a3d4e" />
                                    <XAxis dataKey="step" stroke="#8892b0" />
                                    <YAxis stroke="#8892b0" />
                                    <Tooltip contentStyle={{ backgroundColor: '#2d3142', border: '1px solid #3a3d4e' }} />
                                    <Legend />
                                    
                                    {/* Sample paths (grey) */}
                                    {data.simulations.paths.slice(0, 5).map((path, i) => (
                                        <Line 
                                            key={i} 
                                            dataKey="value" 
                                            data={path} 
                                            stroke="#8892b0" 
                                            strokeWidth={0.5} 
                                            dot={false}
                                            hideInLegend={true}
                                        />
                                    ))}
                                    
                                    <Line dataKey="value" data={data.simulations.meanPath} stroke="#64ffda" strokeWidth={2} name="Mean Path" />
                                    <Line dataKey="value" data={data.simulations.percentile5Path} stroke="#ff6b6b" strokeWidth={2} name="5th Percentile" />
                                    <Line dataKey="value" data={data.simulations.percentile95Path} stroke="#4caf50" strokeWidth={2} name="95th Percentile" />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Panel 8: VaR/CVaR Sensitivity */}
                        <div className="panel">
                            <div className="panel-title">VaR / CVaR Sensitivity to Confidence Level</div>
                            <ResponsiveContainer width="100%" height={350}>
                                <LineChart data={data.sensitivity}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#3a3d4e" />
                                    <XAxis dataKey="confidence" stroke="#8892b0" />
                                    <YAxis stroke="#8892b0" tickFormatter={formatIndianCurrency} />
                                    <Tooltip contentStyle={{ backgroundColor: '#2d3142', border: '1px solid #3a3d4e' }} formatter={formatIndianCurrency} />
                                    <Legend />
                                    <Line type="monotone" dataKey="var" stroke="#ffa726" strokeWidth={2} name="VaR" />
                                    <Line type="monotone" dataKey="cvar" stroke="#f06292" strokeWidth={2} name="CVaR" />
                                    <ReferenceLine x={95} stroke="#8892b0" strokeDasharray="3 3" />
                                    <ReferenceLine x={99} stroke="#8892b0" strokeDasharray="3 3" />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<MonteCarloDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
